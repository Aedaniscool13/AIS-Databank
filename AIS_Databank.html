<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIS Databank — Aedan and Ian Studios</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080808;--s1:#0f0f0f;--s2:#161616;--s3:#1e1e1e;--s4:#252525;
  --bdr:#2a2a2a;--bdr2:#383838;
  --tx:#e8e8e8;--tx2:#999;--tx3:#555;
  --acc:#c8a84b;--acc2:#e8c96d;
  --r:4px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}

/* noise overlay */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:100;background:rgba(8,8,8,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--bdr);padding:0 2.5rem;display:flex;align-items:center;height:56px;gap:2rem}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--tx)}
.logo em{color:var(--acc);font-style:normal}
.hdr-search{flex:1;max-width:500px;position:relative}
.hdr-search input{width:100%;background:var(--s2);border:1px solid var(--bdr2);border-radius:var(--r);padding:7px 40px 7px 14px;font-family:'Barlow',sans-serif;font-size:13px;color:var(--tx);outline:none;transition:border-color .2s;letter-spacing:.02em}
.hdr-search input:focus{border-color:var(--acc)}
.hdr-search input::placeholder{color:var(--tx3);text-transform:uppercase;font-size:12px;letter-spacing:.08em}
.hdr-search svg{position:absolute;right:12px;top:50%;transform:translateY(-50%);opacity:.35;pointer-events:none}
.hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.lock-btn{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:.08em;text-transform:uppercase;padding:6px 16px;border-radius:var(--r);border:1px solid var(--bdr2);background:transparent;color:var(--tx3);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s}
.lock-btn:hover{border-color:var(--tx2);color:var(--tx2)}
.lock-btn.on{border-color:var(--acc);color:var(--acc)}

/* ── ADMIN BAR ── */
.abar{display:none;align-items:center;gap:10px;flex-wrap:wrap;padding:.6rem 2.5rem;background:rgba(200,168,75,.06);border-bottom:1px solid rgba(200,168,75,.2);position:relative;z-index:99}
.abar.show{display:flex}
.abar-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);display:flex;align-items:center;gap:6px}
.abar-sep{width:1px;height:16px;background:var(--bdr2)}
.ml{margin-left:auto}

/* ── BUTTONS ── */
.btn{padding:7px 18px;border-radius:var(--r);font-size:12px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:1px solid var(--bdr2);background:transparent;color:var(--tx2);transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--tx2);color:var(--tx)}
.btn.p{background:var(--acc);border-color:var(--acc);color:#000;font-weight:600}.btn.p:hover{background:var(--acc2)}
.btn.d{border-color:rgba(200,60,60,.4);color:#c84040}.btn.d:hover{background:rgba(200,60,60,.1)}
.btn.sm{padding:4px 12px;font-size:11px}

/* ── CONTENT ── */
.content{position:relative;z-index:1;padding:2rem 2.5rem}

/* ── SECTION HEADER ── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid var(--bdr)}
.sec-hdr h2{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--tx2)}
.sec-hdr h2 strong{color:var(--tx);margin-left:6px}

/* ── WORLD ROW ── */
.world-section{margin-bottom:2.5rem}
.world-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;scrollbar-width:thin;scrollbar-color:var(--bdr2) transparent;-webkit-overflow-scrolling:touch}
.world-row::-webkit-scrollbar{height:4px}
.world-row::-webkit-scrollbar-track{background:transparent}
.world-row::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}

/* ── ENTRY CARD (in row) ── */
.ecard{flex:0 0 180px;background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:border-color .15s,transform .15s;position:relative}
.ecard:hover{border-color:#555;transform:translateY(-3px)}
.ecard-img{width:100%;height:200px;object-fit:cover;display:block}
.ecard-img-ph{width:100%;height:200px;background:var(--s2);display:flex;align-items:center;justify-content:center}
.ecard-img-ph svg{opacity:.12}
.ecard-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.85) 60%);padding:28px 10px 10px}
.ecard-cat{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);display:block;margin-bottom:2px}
.ecard-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;letter-spacing:.03em;color:#fff;line-height:1.2}
.ecard-corner{position:absolute;bottom:0;right:0;width:10px;height:10px;border-right:2px solid var(--acc);border-bottom:2px solid var(--acc);opacity:.5}
.ecard-corner2{position:absolute;bottom:0;left:0;width:10px;height:10px;border-left:2px solid var(--acc);border-bottom:2px solid var(--acc);opacity:.5}

/* ── WORLD HEADER CARD ── */
.world-hdr-card{position:relative;background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:.9rem}
.world-hdr-banner{width:100%;height:90px;object-fit:cover;display:block;opacity:.6}
.world-hdr-banner-ph{width:100%;height:90px;background:var(--s2)}
.world-hdr-info{position:absolute;inset:0;display:flex;align-items:center;padding:0 1.25rem;gap:12px;background:linear-gradient(90deg,rgba(0,0,0,.7) 60%,transparent)}
.world-hdr-type{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--acc);margin-bottom:2px}
.world-hdr-name{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
.world-hdr-count{font-size:12px;color:var(--tx3);margin-top:2px}
.world-hdr-actions{margin-left:auto;display:flex;gap:6px}

/* ── BROWSE SECTION ── */
.browse-wrap{display:grid;grid-template-columns:200px 1fr;gap:1.5rem;align-items:start}
.browse-sidebar{}
.browse-sidebar h3{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--tx3);margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:1px solid var(--bdr)}
.cat-filter-list{display:flex;flex-direction:column;gap:2px}
.cat-filter{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.06em;text-transform:uppercase;color:var(--tx3);transition:all .15s;border:1px solid transparent}
.cat-filter:hover{color:var(--tx2);background:var(--s2)}
.cat-filter.active{color:var(--acc);border-color:rgba(200,168,75,.3);background:rgba(200,168,75,.05)}
.cat-filter .cnt{font-size:11px;color:var(--tx3)}
.cat-filter.active .cnt{color:var(--acc);opacity:.7}

.browse-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}

/* ── DIVIDER ── */
.divider{border:none;border-top:1px solid var(--bdr);margin:2rem 0}

/* ── MODAL ── */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
.mbg.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--bdr2);border-radius:var(--r);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;position:relative}
.modal-hero{position:relative}
.modal-hero img{width:100%;height:240px;object-fit:cover;display:block}
.modal-hero-ph{width:100%;height:140px;background:var(--s2);display:flex;align-items:center;justify-content:center}
.modal-hero-ph svg{opacity:.1}
.modal-hero-gradient{position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(transparent,var(--s1))}
.modal-body{padding:1.25rem 1.5rem 1.75rem}
.modal-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem}
.modal-name{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;line-height:1}
.modal-close{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:20px;line-height:1;padding:4px;transition:color .15s}
.modal-close:hover{color:var(--tx)}
.modal-cat{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--acc);margin-bottom:1rem;display:block}
.field{margin-bottom:10px}
.field-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);margin-bottom:3px}
.field-val{font-size:14px;color:var(--tx2);line-height:1.6;font-weight:300}
.modal-actions{display:flex;gap:8px;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--bdr)}
.modal-corner{position:absolute;bottom:0;right:0;width:16px;height:16px;border-right:2px solid var(--acc);border-bottom:2px solid var(--acc);opacity:.4}

/* ── FORM PANEL ── */
.fpanel{background:var(--s1);border:1px solid var(--bdr2);border-radius:var(--r);padding:1.5rem;margin-bottom:1.5rem;display:none}
.fpanel.open{display:block}
.fpanel-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:1.25rem;color:var(--acc)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fr{margin-bottom:12px}
.fr label{display:block;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);margin-bottom:5px}
.fr input,.fr select,.fr textarea{width:100%;padding:8px 12px;background:var(--s2);border:1px solid var(--bdr);border-radius:var(--r);color:var(--tx);font-size:13px;font-family:'Barlow',sans-serif;outline:none;transition:border-color .2s}
.fr input:focus,.fr select:focus,.fr textarea:focus{border-color:var(--acc)}
.fr textarea{resize:vertical;min-height:80px;font-weight:300}
.fr select option{background:var(--s1)}
.photo-drop{border:1px dashed var(--bdr2);border-radius:var(--r);padding:1.25rem;text-align:center;cursor:pointer;transition:border-color .2s;position:relative}
.photo-drop:hover{border-color:var(--acc)}
.photo-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.photo-drop p{font-size:12px;color:var(--tx3);font-family:'Barlow Condensed',sans-serif;letter-spacing:.06em;text-transform:uppercase;margin-top:6px}
.photo-prev{width:100%;height:110px;object-fit:cover;border-radius:var(--r);margin-top:8px;display:none}
.photo-prev.show{display:block}
.extra-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.fa{display:flex;gap:8px;margin-top:4px}

/* ── LOGIN MODAL ── */
.login-box{background:var(--s1);border:1px solid var(--bdr2);border-radius:var(--r);padding:2.5rem 2rem;width:100%;max-width:340px;text-align:center}
.login-box h2{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.login-box p{font-size:13px;color:var(--tx3);margin-bottom:1.75rem;font-weight:300}
.login-box input{width:100%;padding:10px 14px;background:var(--s2);border:1px solid var(--bdr);border-radius:var(--r);color:var(--tx);font-family:'Barlow Condensed',sans-serif;font-size:16px;letter-spacing:.2em;text-align:center;outline:none;margin-bottom:10px;transition:border-color .2s}
.login-box input:focus{border-color:var(--acc)}
.login-err{font-size:12px;color:#c84040;margin-bottom:10px;display:none;font-family:'Barlow Condensed',sans-serif;letter-spacing:.06em;text-transform:uppercase}

/* ── WORLD PANEL ── */
.wpanel{background:var(--s1);border:1px solid var(--bdr2);border-radius:var(--r);padding:1.25rem;margin-bottom:1.5rem;display:none}
.wpanel.open{display:block}

/* ── EMPTY ── */
.empty{text-align:center;padding:3rem;color:var(--tx3);font-family:'Barlow Condensed',sans-serif;letter-spacing:.06em;text-transform:uppercase;font-size:13px;grid-column:1/-1}

/* ── SEE ALL ── */
.see-all-btn{flex:0 0 60px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);cursor:pointer;transition:border-color .15s;padding:10px}
.see-all-btn:hover{border-color:var(--acc)}
.see-all-btn span{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);writing-mode:vertical-rl;text-orientation:mixed}
.see-all-btn svg{color:var(--acc)}

/* ── CAT MANAGER ── */
.cat-mgr{background:var(--s2);border-radius:var(--r);padding:1rem;margin-top:10px}
.cat-mgr h4{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);margin-bottom:10px}
.cat-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.cat-chip{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:2px;font-size:12px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.06em;border:1px solid var(--bdr2);background:var(--s1);color:var(--tx2)}
.cat-chip button{background:none;border:none;cursor:pointer;color:var(--tx3);font-size:14px;line-height:1;transition:color .15s}
.cat-chip button:hover{color:#c84040}
.cat-add{display:flex;gap:8px}
.cat-add input{flex:1;padding:6px 10px;background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);color:var(--tx);font-family:'Barlow',sans-serif;font-size:13px;outline:none}
.cat-add input:focus{border-color:var(--acc)}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}

/* ── WORLD MODAL ── */
.wmodal{background:var(--s1);border:1px solid var(--bdr2);border-radius:var(--r);width:100%;max-width:480px;padding:1.75rem}

@media(max-width:700px){
  .browse-wrap{grid-template-columns:1fr}
  .fg,.extra-grid{grid-template-columns:1fr}
  .hdr{padding:0 1rem}
  .content{padding:1.25rem 1rem}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div>
    <div class="logo"><em>AIS</em> Databank</div>
  </div>
  <div class="hdr-search">
    <input type="text" id="globalSearch" placeholder="Search Databank" oninput="onGlobalSearch()">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </div>
  <div class="hdr-right">
    <button class="lock-btn" id="lockBtn" onclick="toggleLogin()">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span id="lockLabel">Admin</span>
    </button>
  </div>
</header>

<!-- ADMIN BAR -->
<div class="abar" id="abar">
  <span class="abar-label">
    <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    Beheerder actief
  </span>
  <div class="abar-sep"></div>
  <button class="btn p sm" onclick="openWorldPanel()">+ Nieuwe serie / film</button>
  <button class="btn sm" onclick="openAddEntry()">+ Nieuw item</button>
  <button class="btn sm" onclick="toggleCatMgr()">⚙ Categorieën</button>
  <button class="btn d sm ml" onclick="logout()">Uitloggen</button>
</div>

<div class="content" id="mainContent">

  <!-- WORLD FORM PANEL -->
  <div class="fpanel" id="worldPanel">
    <div class="fpanel-title" id="worldPanelTitle">Nieuwe serie / film toevoegen</div>
    <div class="fg">
      <div class="fr"><label>Naam *</label><input id="wName" placeholder="bv. Wings of Fate"></div>
      <div class="fr"><label>Type</label>
        <select id="wType">
          <option>Film</option><option>Serie</option><option>Game</option><option>Comic</option><option>Overig</option>
        </select>
      </div>
    </div>
    <div class="fr"><label>Beschrijving</label><textarea id="wDesc" placeholder="Korte beschrijving..."></textarea></div>
    <div class="fr"><label>Banner / Poster</label>
      <div class="photo-drop">
        <input type="file" accept="image/*" onchange="prevPhoto(this,'wPrev','wPhoto')">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <p>Klik voor banner / poster afbeelding</p>
      </div>
      <img class="photo-prev" id="wPrev" alt="">
      <input type="hidden" id="wPhoto">
    </div>
    <div class="fa">
      <button class="btn p" onclick="saveWorld()">Opslaan</button>
      <button class="btn" onclick="closeWorldPanel()">Annuleren</button>
    </div>
  </div>

  <!-- ADD ENTRY PANEL -->
  <div class="fpanel" id="addPanel">
    <div class="fpanel-title">Nieuw item toevoegen</div>
    <div class="fg">
      <div class="fr"><label>Naam *</label><input id="eName" placeholder="Naam..."></div>
      <div class="fr"><label>Categorie</label><select id="eCat"></select></div>
    </div>
    <div class="fr"><label>Serie / Film</label><select id="eWorld"></select></div>
    <div class="fr"><label>Ondertitel</label><input id="eSub" placeholder="Korte omschrijving..."></div>
    <div class="fr"><label>Beschrijving</label><textarea id="eDesc" placeholder="Details..."></textarea></div>
    <div class="fr"><label>Foto</label>
      <div class="photo-drop">
        <input type="file" accept="image/*" onchange="prevPhoto(this,'ePrev','ePhoto')">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <p>Klik om een foto te kiezen</p>
      </div>
      <img class="photo-prev" id="ePrev" alt="">
      <input type="hidden" id="ePhoto">
    </div>
    <div class="fr"><label>Extra velden</label>
      <div class="extra-grid">
        <input id="k1" placeholder="Label 1"><input id="v1" placeholder="Waarde 1">
        <input id="k2" placeholder="Label 2"><input id="v2" placeholder="Waarde 2">
        <input id="k3" placeholder="Label 3"><input id="v3" placeholder="Waarde 3">
        <input id="k4" placeholder="Label 4"><input id="v4" placeholder="Waarde 4">
      </div>
    </div>
    <div class="fa">
      <button class="btn p" onclick="saveEntry()">Opslaan</button>
      <button class="btn" onclick="document.getElementById('addPanel').classList.remove('open')">Annuleren</button>
    </div>

    <!-- Cat manager inside add panel -->
    <div class="cat-mgr" id="catMgr" style="display:none">
      <h4>Categorieën beheren</h4>
      <div class="cat-chips" id="catChips"></div>
      <div class="cat-add">
        <input id="newCatIn" placeholder="Nieuwe categorie...">
        <button class="btn p sm" onclick="addCat()">Toevoegen</button>
      </div>
    </div>
  </div>

  <!-- WORLDS ROWS -->
  <div id="worldsContainer"></div>

  <hr class="divider">

  <!-- BROWSE ALL -->
  <div class="sec-hdr">
    <h2>Browse Databank <strong id="browseCount"></strong></h2>
  </div>
  <div class="browse-wrap">
    <div class="browse-sidebar">
      <h3>Categorieën</h3>
      <div class="cat-filter-list" id="catFilterList"></div>
    </div>
    <div class="browse-grid" id="browseGrid"></div>
  </div>

</div>

<!-- LOGIN MODAL -->
<div class="mbg" id="loginBg" onclick="loginBgClose(event)">
  <div class="login-box">
    <svg width="28" height="28" fill="none" stroke="var(--acc)" stroke-width="1.5" viewBox="0 0 24 24" style="margin:0 auto 12px"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    <h2>Admin Login</h2>
    <p>Voer het wachtwoord in</p>
    <input type="password" id="pwIn" placeholder="••••••" onkeydown="if(event.key==='Enter')tryLogin()">
    <div class="login-err" id="loginErr">Verkeerd wachtwoord</div>
    <button class="btn p" style="width:100%;justify-content:center" onclick="tryLogin()">Inloggen</button>
  </div>
</div>

<!-- ENTRY DETAIL MODAL -->
<div class="mbg" id="detailBg" onclick="detailBgClose(event)">
  <div class="modal" id="detailModal"></div>
</div>

<!-- WORLD EDIT MODAL -->
<div class="mbg" id="weditBg" onclick="weditBgClose(event)">
  <div class="wmodal" id="weditModal"></div>
</div>

<script>
// ═══════════════════════════════════════════
// WACHTWOORD — pas dit aan!
const ADMIN_PW = 'AIS2026!@#';
// ═══════════════════════════════════════════

const DB_KEY = 'ais_db_v4';
const WD_KEY = 'ais_worlds_v1';
const CT_KEY = 'ais_cats_v2';

let db = [], worlds = [], cats = [];
let isAdmin = false;
let activeBrowseCat = 'Alles';
let editingWorldId = null;
let editingEntryId = null;

// ── LOAD / SAVE ──
function load() {
  try { db = JSON.parse(localStorage.getItem(DB_KEY)||'[]'); } catch(e){db=[];}
  try { worlds = JSON.parse(localStorage.getItem(WD_KEY)||'[]'); } catch(e){worlds=[];}
  try { cats = JSON.parse(localStorage.getItem(CT_KEY)||'[]'); } catch(e){cats=[];}
  if (!cats.length) cats = ['Karakter','Locatie','Item','Organisatie','Event','Overig'];
  if (!worlds.length) worlds = [
    {id:1, name:'Wings of Fate', type:'Film', desc:'', photo:''},
    {id:2, name:'Onbekend Project', type:'Serie', desc:'', photo:''},
  ];
  if (!db.length) db = [
    {id:1,worldId:1,name:'Aedan',cat:'Karakter',sub:'Hoofdpersonage',desc:'Een van de twee oprichters van AIS.',photo:'',extra:[{k:'Rol',v:'Hoofdrol'},{k:'',v:''},{k:'',v:''},{k:'',v:''}]},
    {id:2,worldId:1,name:'Ian',cat:'Karakter',sub:'Medeoprichter',desc:'Creatief directeur van AIS.',photo:'',extra:[{k:'Rol',v:'Bijrol'},{k:'',v:''},{k:'',v:''},{k:'',v:''}]},
    {id:3,worldId:2,name:'Studio HQ',cat:'Locatie',sub:'Hoofdkwartier',desc:'Centrale locatie.',photo:'',extra:[{k:'Type',v:'Interieur'},{k:'',v:''},{k:'',v:''},{k:'',v:''}]},
  ];
  save();
}
function save() {
  localStorage.setItem(DB_KEY, JSON.stringify(db));
  localStorage.setItem(WD_KEY, JSON.stringify(worlds));
  localStorage.setItem(CT_KEY, JSON.stringify(cats));
}

// ── AUTH ──
function toggleLogin() {
  if (isAdmin) { logout(); return; }
  document.getElementById('loginBg').classList.add('open');
  document.getElementById('pwIn').value='';
  document.getElementById('loginErr').style.display='none';
  setTimeout(()=>document.getElementById('pwIn').focus(),100);
}
function tryLogin() {
  if (document.getElementById('pwIn').value === ADMIN_PW) {
    isAdmin=true;
    document.getElementById('loginBg').classList.remove('open');
    document.getElementById('abar').classList.add('show');
    document.getElementById('lockBtn').classList.add('on');
    document.getElementById('lockLabel').textContent='Admin ✓';
    renderAll();
  } else {
    document.getElementById('loginErr').style.display='block';
    document.getElementById('pwIn').value='';
  }
}
function logout() {
  isAdmin=false;
  document.getElementById('abar').classList.remove('show');
  document.getElementById('lockBtn').classList.remove('on');
  document.getElementById('lockLabel').textContent='Admin';
  document.getElementById('addPanel').classList.remove('open');
  document.getElementById('worldPanel').classList.remove('open');
  renderAll();
}
function loginBgClose(e){if(e.target===document.getElementById('loginBg'))document.getElementById('loginBg').classList.remove('open');}

// ── CATEGORIES ──
function toggleCatMgr() {
  document.getElementById('addPanel').classList.add('open');
  const el=document.getElementById('catMgr');
  el.style.display=el.style.display==='none'?'block':'none';
  renderCatMgr();
}
function renderCatMgr() {
  document.getElementById('catChips').innerHTML=cats.map(c=>`<span class="cat-chip">${c}<button onclick="removeCat('${c}')">×</button></span>`).join('');
  populateCatSelect();
}
function addCat() {
  const v=document.getElementById('newCatIn').value.trim();
  if(!v||cats.includes(v)) return;
  cats.push(v); document.getElementById('newCatIn').value='';
  save(); renderCatMgr(); renderAll();
}
function removeCat(name) {
  if (!confirm(`Categorie "${name}" verwijderen?`)) return;
  cats=cats.filter(c=>c!==name); save(); renderCatMgr(); renderAll();
}
function populateCatSelect() {
  ['eCat','editECat'].forEach(id=>{
    const el=document.getElementById(id); if(!el) return;
    const cur=el.value;
    el.innerHTML=cats.map(c=>`<option${c===cur?' selected':''}>${c}</option>`).join('');
  });
}
function populateWorldSelect() {
  ['eWorld','editEWorld'].forEach(id=>{
    const el=document.getElementById(id); if(!el) return;
    const cur=el.value;
    el.innerHTML=worlds.map(w=>`<option value="${w.id}"${w.id==cur?' selected':''}>${w.name}</option>`).join('');
  });
}

// ── WORLDS ──
function openWorldPanel(editId=null) {
  editingWorldId=editId;
  document.getElementById('addPanel').classList.remove('open');
  const panel=document.getElementById('worldPanel');
  panel.classList.add('open');
  if (editId) {
    const w=worlds.find(x=>x.id===editId);
    document.getElementById('worldPanelTitle').textContent='Serie / Film bewerken';
    document.getElementById('wName').value=w.name;
    document.getElementById('wType').value=w.type;
    document.getElementById('wDesc').value=w.desc||'';
    document.getElementById('wPhoto').value=w.photo||'';
    const p=document.getElementById('wPrev');
    if(w.photo){p.src=w.photo;p.classList.add('show');}else{p.src='';p.classList.remove('show');}
  } else {
    document.getElementById('worldPanelTitle').textContent='Nieuwe serie / film toevoegen';
    document.getElementById('wName').value='';
    document.getElementById('wType').value='Film';
    document.getElementById('wDesc').value='';
    document.getElementById('wPhoto').value='';
    document.getElementById('wPrev').classList.remove('show');
  }
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function closeWorldPanel() {
  document.getElementById('worldPanel').classList.remove('open');
  editingWorldId=null;
}
function saveWorld() {
  const name=document.getElementById('wName').value.trim();
  if(!name){alert('Naam is verplicht!');return;}
  if(editingWorldId) {
    const w=worlds.find(x=>x.id===editingWorldId);
    w.name=name; w.type=document.getElementById('wType').value;
    w.desc=document.getElementById('wDesc').value;
    const np=document.getElementById('wPhoto').value; if(np) w.photo=np;
  } else {
    worlds.push({id:Date.now(),name,type:document.getElementById('wType').value,desc:document.getElementById('wDesc').value,photo:document.getElementById('wPhoto').value});
  }
  save(); closeWorldPanel(); renderAll();
}
function deleteWorld(id) {
  if(!confirm('Deze serie/film en al zijn items verwijderen?')) return;
  worlds=worlds.filter(w=>w.id!==id);
  db=db.filter(e=>e.worldId!==id);
  save(); renderAll();
}

// ── ENTRIES ──
function openAddEntry(worldId=null) {
  editingEntryId=null;
  document.getElementById('worldPanel').classList.remove('open');
  const panel=document.getElementById('addPanel');
  panel.classList.add('open');
  ['eName','eSub','eDesc','ePhoto','k1','v1','k2','v2','k3','v3','k4','v4'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('ePrev').classList.remove('show');
  document.getElementById('ePrev').src='';
  populateCatSelect(); populateWorldSelect();
  if(worldId) document.getElementById('eWorld').value=worldId;
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function saveEntry() {
  const name=document.getElementById('eName').value.trim();
  if(!name){alert('Naam is verplicht!');return;}
  const entry={
    id:Date.now(),
    worldId:parseInt(document.getElementById('eWorld').value),
    name, cat:document.getElementById('eCat').value,
    sub:document.getElementById('eSub').value,
    desc:document.getElementById('eDesc').value,
    photo:document.getElementById('ePhoto').value,
    extra:[1,2,3,4].map(i=>({k:document.getElementById('k'+i).value,v:document.getElementById('v'+i).value}))
  };
  db.unshift(entry); save();
  document.getElementById('addPanel').classList.remove('open');
  renderAll();
}

function openEditEntry(id) {
  const e=db.find(x=>x.id===id); if(!e) return;
  document.getElementById('detailBg').classList.remove('open');
  const ex=e.extra||[]; while(ex.length<4) ex.push({k:'',v:''});

  const catOpts=cats.map(c=>`<option${c===e.cat?' selected':''}>${c}</option>`).join('');
  const wOpts=worlds.map(w=>`<option value="${w.id}"${w.id===e.worldId?' selected':''}>${w.name}</option>`).join('');

  document.getElementById('weditModal').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem">
      <div class="fpanel-title" style="margin:0">Item bewerken</div>
      <button class="modal-close" onclick="closeWedit()">×</button>
    </div>
    <div class="fg">
      <div class="fr"><label>Naam</label><input id="editEN" value="${e.name}"></div>
      <div class="fr"><label>Categorie</label><select id="editECat">${catOpts}</select></div>
    </div>
    <div class="fr"><label>Serie / Film</label><select id="editEWorld">${wOpts}</select></div>
    <div class="fr"><label>Ondertitel</label><input id="editES" value="${e.sub||''}"></div>
    <div class="fr"><label>Beschrijving</label><textarea id="editED">${e.desc||''}</textarea></div>
    <div class="fr"><label>Foto</label>
      <div class="photo-drop"><input type="file" accept="image/*" onchange="prevPhoto(this,'editEPrev','editEPhoto')">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <p>Nieuwe foto (leeg = huidige behouden)</p>
      </div>
      <img class="photo-prev${e.photo?' show':''}" id="editEPrev" src="${e.photo||''}" alt="">
      <input type="hidden" id="editEPhoto" value="${e.photo||''}">
    </div>
    <div class="fr"><label>Extra velden</label>
      <div class="extra-grid">
        ${[0,1,2,3].map(i=>`<input id="editK${i}" value="${ex[i].k}" placeholder="Label ${i+1}" style="padding:7px 10px;background:var(--s2);border:1px solid var(--bdr);border-radius:var(--r);color:var(--tx);font-family:inherit;outline:none"><input id="editV${i}" value="${ex[i].v}" placeholder="Waarde ${i+1}" style="padding:7px 10px;background:var(--s2);border:1px solid var(--bdr);border-radius:var(--r);color:var(--tx);font-family:inherit;outline:none">`).join('')}
      </div>
    </div>
    <div class="fa" style="margin-top:12px">
      <button class="btn p" onclick="saveEditEntry(${id})">Opslaan</button>
      <button class="btn d" onclick="deleteEntry(${id})">Verwijderen</button>
      <button class="btn" onclick="closeWedit()">Annuleren</button>
    </div>`;
  document.getElementById('weditBg').classList.add('open');
}

function saveEditEntry(id) {
  const e=db.find(x=>x.id===id); if(!e) return;
  e.name=document.getElementById('editEN').value.trim()||e.name;
  e.cat=document.getElementById('editECat').value;
  e.worldId=parseInt(document.getElementById('editEWorld').value);
  e.sub=document.getElementById('editES').value;
  e.desc=document.getElementById('editED').value;
  const np=document.getElementById('editEPhoto').value; if(np) e.photo=np;
  e.extra=[0,1,2,3].map(i=>({k:document.getElementById('editK'+i).value,v:document.getElementById('editV'+i).value}));
  save(); closeWedit(); renderAll();
}
function deleteEntry(id) {
  if(!confirm('Item verwijderen?')) return;
  db=db.filter(x=>x.id!==id); save(); closeWedit(); renderAll();
}

// ── RENDER ──
function renderAll() {
  populateCatSelect(); populateWorldSelect();
  renderWorldRows();
  renderBrowse();
}

function renderWorldRows() {
  const q=document.getElementById('globalSearch').value.toLowerCase();
  const container=document.getElementById('worldsContainer');

  if (q) { container.innerHTML=''; return; } // in search mode skip world rows

  container.innerHTML = worlds.map(w => {
    const items=db.filter(e=>e.worldId===w.id);
    const preview=items.slice(0,8);
    const bannerHtml=w.photo
      ? `<img class="world-hdr-banner" src="${w.photo}" alt="${w.name}">`
      : `<div class="world-hdr-banner-ph"></div>`;
    const adminBtns=isAdmin
      ? `<div style="display:flex;gap:6px"><button class="btn sm" onclick="event.stopPropagation();openAddEntry(${w.id})">+ Item</button><button class="btn sm" onclick="event.stopPropagation();openWorldPanel(${w.id})">✏</button><button class="btn d sm" onclick="event.stopPropagation();deleteWorld(${w.id})">✕</button></div>`
      : '';

    const cards=preview.map(e => {
      const imgHtml=e.photo
        ? `<img class="ecard-img" src="${e.photo}" alt="${e.name}">`
        : `<div class="ecard-img-ph"><svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`;
      return `<div class="ecard" onclick="openDetail(${e.id})">
        ${imgHtml}
        <div class="ecard-overlay">
          <span class="ecard-cat">${e.cat}</span>
          <div class="ecard-name">${e.name}</div>
        </div>
        <div class="ecard-corner"></div><div class="ecard-corner2"></div>
      </div>`;
    }).join('');

    const seeAll=items.length>8
      ? `<div class="see-all-btn" onclick="filterByWorld(${w.id})"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg><span>See All ${items.length}</span></div>`
      : '';

    return `<div class="world-section">
      <div class="world-hdr-card">
        ${bannerHtml}
        <div class="world-hdr-info">
          <div>
            <div class="world-hdr-type">${w.type}</div>
            <div class="world-hdr-name">${w.name}</div>
            <div class="world-hdr-count">${items.length} items</div>
          </div>
          <div class="world-hdr-actions">${adminBtns}</div>
        </div>
      </div>
      <div class="world-row">${cards}${seeAll}</div>
    </div>`;
  }).join('');

  if (!worlds.length && isAdmin) {
    container.innerHTML=`<div style="text-align:center;padding:2rem;color:var(--tx3);font-family:'Barlow Condensed',sans-serif;letter-spacing:.06em;text-transform:uppercase;font-size:13px">Nog geen series/films. Klik "+ Nieuwe serie / film" om te beginnen.</div>`;
  }
}

let browseWorld = null;
function filterByWorld(wid) {
  browseWorld=wid; activeBrowseCat='Alles';
  document.getElementById('browseGrid').scrollIntoView({behavior:'smooth'});
  renderBrowse();
}

function renderBrowse() {
  const q=document.getElementById('globalSearch').value.toLowerCase();
  let items=db.filter(e=>{
    const mq=!q||(e.name.toLowerCase().includes(q)||(e.sub||'').toLowerCase().includes(q)||(e.desc||'').toLowerCase().includes(q));
    const mc=activeBrowseCat==='Alles'||e.cat===activeBrowseCat;
    const mw=!browseWorld||e.worldId===browseWorld;
    return mq&&mc&&mw;
  });

  // cat filter list
  const allCats=['Alles',...new Set([...cats,...db.map(e=>e.cat)])];
  document.getElementById('catFilterList').innerHTML=allCats.map(c=>{
    const cnt=c==='Alles'?db.length:db.filter(e=>e.cat===c).length;
    return `<div class="cat-filter${c===activeBrowseCat?' active':''}" onclick="setBrowseCat('${c}')">
      <span>${c}</span><span class="cnt">${cnt}</span>
    </div>`;
  }).join('');

  document.getElementById('browseCount').textContent=`(${items.length})`;

  const grid=document.getElementById('browseGrid');
  if(!items.length){grid.innerHTML='<div class="empty">Geen items gevonden</div>';return;}
  grid.innerHTML=items.map(e=>{
    const imgHtml=e.photo
      ? `<img class="ecard-img" src="${e.photo}" alt="${e.name}">`
      : `<div class="ecard-img-ph"><svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`;
    return `<div class="ecard" onclick="openDetail(${e.id})" style="flex:unset">
      ${imgHtml}
      <div class="ecard-overlay">
        <span class="ecard-cat">${e.cat}</span>
        <div class="ecard-name">${e.name}</div>
      </div>
      <div class="ecard-corner"></div><div class="ecard-corner2"></div>
    </div>`;
  }).join('');
}

function setBrowseCat(c){browseWorld=null;activeBrowseCat=c;renderBrowse();}
function onGlobalSearch(){browseWorld=null;activeBrowseCat='Alles';renderAll();}

// ── DETAIL ──
function openDetail(id) {
  const e=db.find(x=>x.id===id); if(!e) return;
  const w=worlds.find(x=>x.id===e.worldId);
  const extras=(e.extra||[]).filter(x=>x.k).map(x=>`<div class="field"><div class="field-lbl">${x.k}</div><div class="field-val">${x.v||'—'}</div></div>`).join('');
  const heroHtml=e.photo
    ? `<div class="modal-hero"><img src="${e.photo}" alt="${e.name}"><div class="modal-hero-gradient"></div></div>`
    : `<div class="modal-hero-ph"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`;
  const adminBtns=isAdmin?`<button class="btn sm p" onclick="closeDetail();openEditEntry(${id})">✏ Bewerken</button>`:'';

  document.getElementById('detailModal').innerHTML=`
    ${heroHtml}
    <div class="modal-body">
      <div class="modal-top">
        <div class="modal-name">${e.name}</div>
        <button class="modal-close" onclick="closeDetail()">×</button>
      </div>
      <span class="modal-cat">${e.cat}${w?` · ${w.name}`:''}</span>
      ${e.sub?`<div class="field"><div class="field-lbl">Omschrijving</div><div class="field-val">${e.sub}</div></div>`:''}
      ${e.desc?`<div class="field"><div class="field-lbl">Details</div><div class="field-val">${e.desc}</div></div>`:''}
      ${extras}
      ${adminBtns?`<div class="modal-actions">${adminBtns}</div>`:''}
    </div>
    <div class="modal-corner"></div>`;
  document.getElementById('detailBg').classList.add('open');
}
function closeDetail(){document.getElementById('detailBg').classList.remove('open');}
function detailBgClose(e){if(e.target===document.getElementById('detailBg'))closeDetail();}
function closeWedit(){document.getElementById('weditBg').classList.remove('open');}
function weditBgClose(e){if(e.target===document.getElementById('weditBg'))closeWedit();}

function prevPhoto(input,prevId,dataId){
  const f=input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    const p=document.getElementById(prevId);
    p.src=ev.target.result; p.classList.add('show');
    document.getElementById(dataId).value=ev.target.result;
  };
  r.readAsDataURL(f);
}

load(); renderAll();
</script>
</body>
</html>
